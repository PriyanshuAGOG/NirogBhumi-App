name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  android:
    name: Android build and tests
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - uses: gradle/actions/setup-gradle@v4
      - name: Make Gradle wrapper executable
        run: chmod +x gradlew
      - name: Compile, test, lint, and package debug APK
        run: ./gradlew --no-daemon --max-workers=2 testDebugUnitTest lintDebug assembleDebug
      - name: Upload debug APK and reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-debug-and-reports
          if-no-files-found: ignore
          path: |
            app/build/outputs/apk/debug/*.apk
            app/build/reports/**

  functions:
    name: Firebase Functions type-check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: firebase/functions
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: firebase/functions/package-lock.json
      - run: npm ci
      - run: npm test
