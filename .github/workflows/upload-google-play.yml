name: Upload Android App Bundle to Google Play

on:
  workflow_dispatch:
    inputs:
      track:
        description: "Google Play track to upload to"
        required: true
        default: internal
        type: choice
        options:
          - internal
          - alpha
          - beta
          - production
      release_status:
        description: "Google Play release status"
        required: true
        default: draft
        type: choice
        options:
          - draft
          - completed
          - inProgress
          - halted
      release_name:
        description: "Human-readable release name"
        required: false
        default: "Nirog Bhumi"
        type: string
      changes_not_sent_for_review:
        description: "Leave Play Console changes pending for manual review submission"
        required: true
        default: true
        type: boolean

permissions:
  contents: read

concurrency:
  group: google-play-upload-${{ github.ref }}
  cancel-in-progress: false

jobs:
  upload:
    name: Build signed AAB and upload to Google Play
    runs-on: ubuntu-latest
    timeout-minutes: 60
    environment: production
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
      - uses: gradle/actions/setup-gradle@v6
      - name: Validate release and Play Console secrets
        env:
          GOOGLE_SERVICES_JSON_BASE64: ${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          GOOGLE_PLAY_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
        run: |
          test -n "$GOOGLE_SERVICES_JSON_BASE64"
          test -n "$ANDROID_KEYSTORE_BASE64"
          test -n "$STORE_PASSWORD"
          test -n "$KEY_ALIAS"
          test -n "$KEY_PASSWORD"
          test -n "$GOOGLE_PLAY_SERVICE_ACCOUNT_JSON"
      - name: Materialize protected release files
        env:
          GOOGLE_SERVICES_JSON_BASE64: ${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          printf '%s' "$GOOGLE_SERVICES_JSON_BASE64" | base64 --decode > app/google-services.json
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/nirog-upload.jks"
      - name: Build signed release bundle
        env:
          KEYSTORE_PATH: ${{ runner.temp }}/nirog-upload.jks
          STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          chmod +x gradlew
          ./gradlew --no-daemon --max-workers=2 testReleaseUnitTest lintRelease bundleRelease
      - name: Upload bundle to Google Play
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: in.nirogbhumi.app
          releaseFiles: app/build/outputs/bundle/release/*.aab
          tracks: ${{ inputs.track }}
          status: ${{ inputs.release_status }}
          releaseName: ${{ inputs.release_name }}
          whatsNewDirectory: play/whatsnew
          changesNotSentForReview: ${{ inputs.changes_not_sent_for_review }}
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: nirog-bhumi-play-upload-aab
          if-no-files-found: ignore
          retention-days: 14
          path: app/build/outputs/bundle/release/*.aab
