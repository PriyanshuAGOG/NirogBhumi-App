name: Build Firebase-connected debug APK

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  debug-apk:
    name: Assemble debug APK with real Firebase config
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: production
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
      - uses: gradle/actions/setup-gradle@v6
      - name: Validate Firebase config secret
        env:
          GOOGLE_SERVICES_JSON_BASE64: ${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}
        run: test -n "$GOOGLE_SERVICES_JSON_BASE64"
      - name: Materialize app/google-services.json
        env:
          GOOGLE_SERVICES_JSON_BASE64: ${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}
        run: |
          printf '%s' "$GOOGLE_SERVICES_JSON_BASE64" | base64 --decode --ignore-garbage > app/google-services.json
          python3 -c "import json,sys; json.load(open('app/google-services.json'))"
      - name: Build debug APK
        run: |
          chmod +x gradlew
          ./gradlew --no-daemon --max-workers=2 assembleDebug
      - uses: actions/upload-artifact@v7
        with:
          name: nirog-bhumi-firebase-debug-apk
          if-no-files-found: error
          retention-days: 14
          path: app/build/outputs/apk/debug/*.apk
