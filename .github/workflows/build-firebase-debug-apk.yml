name: Build Firebase-connected debug APK

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  debug-apk:
    name: Assemble debug APK with real Firebase config
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: production
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
      - uses: gradle/actions/setup-gradle@v6
      - name: Validate Firebase config secret
        env:
          GOOGLE_SERVICES_JSON_BASE64: ${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}
        run: test -n "$GOOGLE_SERVICES_JSON_BASE64"
      - name: Materialize app/google-services.json
        env:
          GOOGLE_SERVICES_JSON_BASE64: ${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}
        run: |
          printf '%s' "$GOOGLE_SERVICES_JSON_BASE64" | base64 --decode --ignore-garbage > app/google-services.json
          python3 -c "import json,sys; json.load(open('app/google-services.json'))"
      - name: Build debug APK
        run: |
          chmod +x gradlew
          ./gradlew --no-daemon --max-workers=2 assembleDebug
      - uses: actions/upload-artifact@v7
        with:
          name: nirog-bhumi-firebase-debug-apk
          if-no-files-found: error
          retention-days: 14
          path: app/build/outputs/apk/debug/*.apk
      - name: Distribute to Firebase App Distribution testers
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
          APP_DISTRIBUTION_TESTERS: ${{ secrets.APP_DISTRIBUTION_TESTERS }}
        run: |
          if [ -z "$FIREBASE_TOKEN" ] || [ -z "$APP_DISTRIBUTION_TESTERS" ]; then
            echo "FIREBASE_TOKEN and/or APP_DISTRIBUTION_TESTERS secret not set - skipping App Distribution upload."
            echo "Set both (Settings > Environments > production) to have new builds pushed to testers automatically."
            exit 0
          fi
          APK_PATH="$(find app/build/outputs/apk/debug -name '*.apk' | head -n1)"
          npx --yes firebase-tools@15.22.3 appdistribution:distribute "$APK_PATH" \
            --app 1:126409331898:android:b4e478566dcbeeb7009e83 \
            --project nirog-bhumi-app \
            --testers "$APP_DISTRIBUTION_TESTERS" \
            --release-notes "Automated debug build - commit ${{ github.sha }}"
